version: 2

models:
  - name: dim_customer
    description: "Customer dimension"
    columns:
      - name: customer_sk
        tests:
          - unique
          - not_null
          
  - name: dim_date
    description: "Date dimension"
    columns:
      - name: date_sk
        tests:
          - unique
          - not_null

  - name: dim_payment
    description: "Payment dimension"
    columns:
      - name: payment_sk
        tests:
          - unique
          - not_null

      - name: order_id
        tests:
          - not_null

  - name: dim_product
    description: "Product dimension"
    columns:
      - name: product_sk
        tests:
          - unique
          - not_null

      - name: product_id
        tests:
          - not_null

  - name: dim_seller
    description: "Seller dimension"
    columns:
      - name: seller_sk
        tests:
          - unique
          - not_null

      - name: seller_id
        tests:
          - not_null


